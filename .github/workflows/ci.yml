name: CI

on:
  pull_request:
    branches: [dev, main]

# 같은 PR에 연속으로 push하면 이전 CI 실행을 취소하고 최신 실행만 유지 (runner·시간 절약)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN 최소 권한: 이 job은 코드 검증만 하므로 읽기 전용으로 제한
permissions:
  contents: read

jobs:
  verify:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # @v4가 가리키는 커밋(v4.4.0)으로 고정 - 이동 태그로 인한 예기치 않은 동작 변경 방지
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          # checkout 토큰을 로컬 Git 설정에 남기지 않음 (이후 npm ci 등 PR 코드 실행 대비)
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # postinstall이 비활성화되어 있어 npm ci만으로는 Prisma Client 타입이 생성되지 않음.
      # type-check/build보다 반드시 먼저 실행해야 함.
      - name: Generate Prisma Client
        run: npx prisma generate

      # validate는 DB에 접속하지 않지만 schema.prisma의 env("DATABASE_URL")을
      # 해석하므로 더미 값이 필요함.
      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      # 테스트 스크립트(npm test) 추가 후 아래 주석 해제
      # - name: Test
      #   run: npm test