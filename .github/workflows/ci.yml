name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  verify:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # postinstall이 비활성화되어 있어 npm ci만으로는 Prisma Client 타입이 생성되지 않음.
      # type-check/build보다 반드시 먼저 실행해야 함.
      - name: Generate Prisma Client
        run: npx prisma generate

      # validate는 DB에 접속하지 않지만 schema.prisma의 env("DATABASE_URL")을
      # 해석하므로 더미 값이 필요함.
      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      # 테스트 스크립트(npm test) 추가 후 아래 주석 해제
      # - name: Test
      #   run: npm test