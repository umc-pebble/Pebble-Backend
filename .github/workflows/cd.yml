name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 이 job은 EC2에 SSH로 접속해 배포하므로 리포 내용을 읽는 것 외 추가 권한 불필요
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      # .env는 .gitignore 대상이라 checkout 결과물에 애초에 포함되지 않는다 -> EC2의 기존 .env는 건드리지 않음
      - name: Build deployment archive
        run: tar czf /tmp/deploy.tar.gz --exclude='.git' --exclude='node_modules' .

      - name: Upload and deploy
        run: |
          scp -i ~/.ssh/deploy_key /tmp/deploy.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/deploy.tar.gz"
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" '
            set -e
            mkdir -p ~/app
            tar xzf ~/deploy.tar.gz -C ~/app
            rm ~/deploy.tar.gz
            cd ~/app
            sudo docker compose -f docker-compose.prod.yml up -d --build
            sudo docker image prune -f
          '

      - name: Verify health check
        run: |
          for i in $(seq 1 20); do
            if curl --fail --silent "http://${{ secrets.EC2_HOST }}:3000/health"; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check attempt ${i}/20 failed, retrying..."
            sleep 5
          done
          echo "Health check failed."
          exit 1
