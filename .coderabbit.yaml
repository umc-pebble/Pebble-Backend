language: "ko-KR"
tone_instructions: "Pebble 백엔드 팀 프로젝트. 리뷰는 한국어로, 팀 컨벤션(CLAUDE.md) 위반 여부를 최우선으로 짚어줘."

reviews:
  profile: "assertive"
  request_changes_workflow: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "dev"

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!prisma/migrations/**"
    - "!package-lock.json"

  path_instructions:
    - path: "src/**/*.controller.ts"
      instructions: >
        Pebble 백엔드 컨트롤러 리뷰 규칙:
        - 컨트롤러에 Prisma 쿼리(예: prisma.xxx.findMany 등)를 직접 작성하면 안 된다. 반드시 같은 도메인의
          repository를 경유해야 한다.
        - 비즈니스 로직(조건 분기, 계산, 여러 단계의 DB 조작)이 컨트롤러에 있으면 안 된다. service로 위임해야 한다.
        - 컨트롤러 함수는 async (req, res, next)로 정의하고, 내부는 try/catch로 감싸 catch에서
          next(err)를 호출해야 한다 (Express 4는 async 에러 자동 전파가 안 됨).
        - 응답은 res.json()으로 직접 조립하면 안 되고 sendSuccess(res, data, message, status) 유틸을
          사용해야 한다.
        - 에러는 컨트롤러가 아니라 service에서 throw new AppError('코드키', '메시지') 형태로 던져야 한다.

    - path: "src/**/*.service.ts"
      instructions: >
        Pebble 백엔드 서비스 레이어 리뷰 규칙:
        - 에러는 throw new AppError('코드키', '메시지') 형태로만 던진다. '코드키'는 반드시
          src/constants/error-code.ts에 정의된 키여야 한다 — 파일에 없는 새 코드 문자열을 임의로
          만들어 쓰면 안 된다 (팀장 승인 후 error-code.ts에 추가하는 절차가 필요함을 지적할 것).
        - DB 접근은 반드시 같은 도메인의 repository를 통해야 하며, service 파일 안에 Prisma 쿼리를
          직접 작성하면 안 된다.
        - userId는 요청 바디/쿼리/URL 파라미터로 받지 않고 컨트롤러가 JWT에서 추출해 넘긴 값을
          사용해야 한다 (본인 리소스 조회에 남의 id를 넣을 수 있는 구조면 지적할 것).
        - 비밀번호는 bcrypt 해시로만 저장/비교하고, 응답 객체에 password, refreshToken 필드가
          그대로 노출되면 안 된다.

    - path: "src/**/*.route.ts"
      instructions: >
        Pebble 백엔드 라우트 리뷰 규칙:
        - 새 엔드포인트에는 Swagger JSDoc(@swagger) 주석이 있어야 하며, 응답 예시는
          { success, message, data } 포맷을 따라야 한다. { code, message, data } 같은 다른 포맷은
          우리 컨벤션이 아니므로 발견 시 지적할 것.
        - 경로는 리소스 중심 · 복수형 · kebab-case여야 한다 (예: /follows, /activity-logs,
          /categories). UI 은어(grass 등)를 경로에 쓰면 안 된다.
        - 라우트 안에서 /api/v1 접두사를 다시 붙이면 안 된다 (앱 레벨에서 이미 적용됨).
        - body 검증은 zod 스키마 + validateBody(schema) 미들웨어로 하고, 컨트롤러에서
          같은 검증을 반복하면 안 된다.
        - 고정 경로(예: /tasks/order)는 파라미터 경로(예: /tasks/:id)보다 먼저 등록되어야 한다 —
          순서가 반대면 라우팅 버그이므로 반드시 지적할 것.

    - path: "src/constants/error-code.ts"
      instructions: >
        이 파일은 에러 코드의 유일한 기준이다.
        - 코드 키는 {도메인}_{내용} 형식의 UPPER_SNAKE_CASE여야 한다 (예: AUTH_EMAIL_DUPLICATED).
        - 같은 의미의 코드가 이미 있는데 새 키를 또 추가하는 중복은 지적할 것.
        - status는 실제 HTTP 의미에 맞아야 한다 (권한 없음 403, 리소스 없음 404, 입력 오류 400 등).

    - path: "src/**/*.ts"
      instructions: >
        Pebble 백엔드 공통 코드 스타일:
        - var, any 사용 금지 (any 대신 unknown + 타입 가드).
        - console.log 사용 금지 — logger를 사용해야 한다 (단, 서버 기동 로그·최상위 에러 핸들러의
          로그는 예외로 허용).
        - 상대경로만 사용한다 — '@/'로 시작하는 경로 별칭을 쓰면 안 된다 (tsconfig에 paths가
          의도적으로 제거되어 있어 런타임에서 깨진다).
        - 인터페이스/타입 이름에 I/Interface 접두어·접미어를 쓰면 안 된다 (Prisma 생성 타입과
          이름이 충돌할 수 있음).
        - 날짜/시간 집계 로직은 KST(Asia/Seoul) 기준이어야 한다.

chat:
  auto_reply: true
  allow_non_org_members: false
